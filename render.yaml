services:
  - type: web
    name: luxury-catering-api
    runtime: node
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: "*"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: luxury-catering-admin
    runtime: node
    region: ohio
    rootDir: admin
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://luxury-catering-api.onrender.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
